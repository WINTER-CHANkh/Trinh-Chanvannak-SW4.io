<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Sign Up</title>
  <link rel="stylesheet" href="CSS/form.css">
</head>
<body>
  <div class="im"><img src="image/image copy.png" width="80%"></div>
  
  <button id="toggleFormBtn" class="toggle-btn" style="color:white">Log in</button>          
  <div class="wrapper">
     <!-- LOGIN -->
     <div class="form-wrapper sign-in">
       <form id="loginForm">
         <h2>Login</h2>
   
         <div class="input-group">
           <input type="text" id="liUsername" required>
           <label>Username</label>
         </div>
   
         <div class="input-group">
           <input type="password" id="liPassword" required>
           <label>Password</label>
         </div>
   
         <button type="submit">Login</button>
   
         <div class="signUp-link">
           <p>Don't have an account?
             <a href="#" class="signUpBtn-link">Sign Up</a>
           </p>
         </div>
       </form>
     </div>
     <!-- SIGN UP -->
     <div class="form-wrapper sign-up">
       <form id="signupForm">
         <h2>Sign Up</h2>
   
         <div class="input-group">
           <input type="text" id="suUsername" required>
           <label>Username</label>
         </div>
   
         <div class="input-group">
           <input type="email" id="suEmail" required>
           <label>Email</label>
         </div>
   
         <div class="input-group">
           <input type="password" id="suPassword" required>
           <label>Password</label>
         </div>
   
         <button type="submit">Sign Up</button>
   
         <div class="signUp-link">
           <p>Already have an account?
             <a href="#" class="signInBtn-link">Sign In</a>
           </p>
          </div>
        </form>
      </div>
    </div>
    <video autoplay loop muted plays-inline class="video-back" >
      <source src="image/wmremove-transformed.mp4">
    </video>

<script src="/JS/form.js"></script>
</body>
</html>
